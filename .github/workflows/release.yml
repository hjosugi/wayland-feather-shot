name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run headless tests
        run: |
          python3 tests/test_stitcher.py
          python3 tests/test_paths.py

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ inputs.tag }}
        run: |
          VER="${TAG#v}"
          awk -v ver="$VER" '
            $0 ~ "^## " ver { f = 1; next }
            /^## / { f = 0 }
            f' CHANGELOG.md > /tmp/notes.md
          if ! [ -s /tmp/notes.md ]; then
            echo "No CHANGELOG.md section found for $VER" >&2
            exit 1
          fi
          cat /tmp/notes.md

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "wayland-feather-shot $TAG" \
            --notes-file /tmp/notes.md

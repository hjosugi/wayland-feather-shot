name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to create and release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag input
        env:
          TAG: ${{ inputs.tag }}
        run: |
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Tag must look like vX.Y.Z" >&2; exit 2 ;;
          esac

      - name: Run headless tests
        run: |
          for test in tests/test_*.py; do
            python3 "$test"
          done

      - name: Install release build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools
          python3 -m pip install --upgrade build installer wheel setuptools

      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ inputs.tag }}
        run: |
          VER="${TAG#v}"
          awk -v ver="$VER" '
            $0 ~ "^## " ver { f = 1; next }
            /^## / { f = 0 }
            f' CHANGELOG.md > /tmp/notes.md
          if ! [ -s /tmp/notes.md ]; then
            echo "No CHANGELOG.md section found for $VER" >&2
            exit 1
          fi
          cat /tmp/notes.md

      - name: Create or verify tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            if [ "$(git rev-list -n 1 "$TAG")" != "$GITHUB_SHA" ]; then
              echo "Tag $TAG exists but does not point at this commit" >&2
              exit 1
            fi
          else
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
          fi

      - name: Build release assets
        env:
          TAG: ${{ inputs.tag }}
        run: |
          scripts/build-release-assets.sh "$TAG"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          ASSET_DIR="dist/release-$TAG"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --target "$GITHUB_SHA" \
              --title "wayland-feather-shot $TAG" \
              --notes-file /tmp/notes.md
            gh release upload "$TAG" "$ASSET_DIR"/* --clobber
          else
            gh release create "$TAG" "$ASSET_DIR"/* \
              --target "$GITHUB_SHA" \
              --title "wayland-feather-shot $TAG" \
              --notes-file /tmp/notes.md
          fi

      - name: Publish AUR package
        env:
          TAG: ${{ inputs.tag }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "AUR_SSH_PRIVATE_KEY is not set; skipping AUR publish"
            exit 0
          fi

          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

          if ! scripts/publish-aur.sh "$TAG" --push; then
            echo "::warning::AUR publish failed; GitHub release assets were published."
          fi

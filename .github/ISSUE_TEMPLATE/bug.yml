name: Bug report
description: Report a wayland-feather-shot bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: desktop
    attributes:
      label: Desktop / compositor
      placeholder: GNOME, KDE, Hyprland, Sway, etc.
    validations:
      required: true
  - type: input
    id: portal
    attributes:
      label: Portal backend
      placeholder: xdg-desktop-portal-gnome, -kde, -hyprland, -wlr, -gtk
  - type: textarea
    id: diagnose
    attributes:
      label: Output of `wayland-feather-shot diagnose`
      render: text
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
